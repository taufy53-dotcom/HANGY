name: Build HANGY

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow customtkinter pygame

      - name: Verify project files
        shell: cmd
        run: |
          dir
          dir images
          dir music
          dir saves

      - name: Build EXE
        shell: cmd
        run: |
          pyinstaller ^
            --noconfirm ^
            --clean ^
            --windowed ^
            --name HANGY ^
            --add-data "images;images" ^
            --add-data "music;music" ^
            --add-data "saves;saves" ^
            --add-data "words.txt;." ^
            main.py
#hjhj
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: HANGY-Windows
          path: dist/HANGY
